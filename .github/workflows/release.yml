name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-swift-arm64:
    name: Build Swift (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cd native/macos && swift build -c release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-darwin-arm64
          path: native/macos/.build/release/ac-core

  build-swift-x64:
    name: Build Swift (x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cd native/macos && swift build -c release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-darwin-x64
          path: native/macos/.build/release/ac-core

  build-dotnet-x64:
    name: Build .NET (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build release binary (self-contained)
        run: cd native/windows && dotnet publish ACCore/ACCore.csproj -c Release -r win-x64 --self-contained -o publish-x64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-win32-x64
          path: native/windows/publish-x64/ac-core.exe

  build-dotnet-arm64:
    name: Build .NET (arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build release binary (self-contained)
        run: cd native/windows && dotnet publish ACCore/ACCore.csproj -c Release -r win-arm64 --self-contained -o publish-arm64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-win32-arm64
          path: native/windows/publish-arm64/ac-core.exe

  build-ts:
    name: Build TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  package-and-release:
    name: Package & Release
    runs-on: ubuntu-latest
    needs: [build-swift-arm64, build-swift-x64, build-dotnet-x64, build-dotnet-arm64, build-ts]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download compiled TS
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # --- macOS arm64 tarball ---
      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: ac-core-darwin-arm64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ac-core

      - name: Create macOS arm64 tarball
        run: |
          tar czf ac-${{ github.ref_name }}-darwin-arm64.tar.gz \
            dist/ bin/ac-core schema/ package.json README.md

      # --- macOS x64 tarball ---
      - name: Download macOS x64 binary
        uses: actions/download-artifact@v4
        with:
          name: ac-core-darwin-x64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ac-core

      - name: Create macOS x64 tarball
        run: |
          tar czf ac-${{ github.ref_name }}-darwin-x64.tar.gz \
            dist/ bin/ac-core schema/ package.json README.md

      # --- Windows x64 zip ---
      - run: rm -f bin/ac-core
      - name: Download Windows x64 binary
        uses: actions/download-artifact@v4
        with:
          name: ac-core-win32-x64
          path: bin/

      - name: Create Windows x64 zip
        run: zip -r ac-${{ github.ref_name }}-win32-x64.zip dist/ bin/ac-core.exe schema/ package.json README.md

      # --- Windows arm64 zip ---
      - run: rm -f bin/ac-core.exe
      - name: Download Windows arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: ac-core-win32-arm64
          path: bin/

      - name: Create Windows arm64 zip
        run: zip -r ac-${{ github.ref_name }}-win32-arm64.zip dist/ bin/ac-core.exe schema/ package.json README.md

      # --- GitHub Release ---
      - name: Determine if pre-release
        id: prerelease
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '(alpha|beta|rc|dev|canary|preview)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=$(echo '${{ github.ref_name }}' | grep -oE '(alpha|beta|rc|dev|canary|preview)')" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            ac-${{ github.ref_name }}-darwin-arm64.tar.gz
            ac-${{ github.ref_name }}-darwin-x64.tar.gz
            ac-${{ github.ref_name }}-win32-x64.zip
            ac-${{ github.ref_name }}-win32-arm64.zip

      # Publish to npm with the arm64 macOS binary bundled
      # (most macOS users are on Apple Silicon)
      - run: rm -f bin/ac-core.exe
      - name: Download arm64 macOS binary for npm
        uses: actions/download-artifact@v4
        with:
          name: ac-core-darwin-arm64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ac-core

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.prerelease.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true
