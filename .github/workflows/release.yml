name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-swift-arm64:
    name: Build Swift (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cd native/macos && swift build -c release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-darwin-arm64
          path: native/macos/.build/release/ac-core

  build-swift-x64:
    name: Build Swift (x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cd native/macos && swift build -c release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-darwin-x64
          path: native/macos/.build/release/ac-core

  build-ts:
    name: Build TypeScript
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  package-and-release:
    name: Package & Release
    runs-on: macos-14
    needs: [build-swift-arm64, build-swift-x64, build-ts]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download compiled TS
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: ac-core-darwin-arm64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ac-core

      - name: Create arm64 tarball
        run: |
          tar czf ac-v${{ github.ref_name }}-darwin-arm64.tar.gz \
            dist/ bin/ac-core schema/ package.json README.md

      - name: Replace with x64 binary
        run: rm bin/ac-core

      - name: Download x64 binary
        uses: actions/download-artifact@v4
        with:
          name: ac-core-darwin-x64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ac-core

      - name: Create x64 tarball
        run: |
          tar czf ac-v${{ github.ref_name }}-darwin-x64.tar.gz \
            dist/ bin/ac-core schema/ package.json README.md

      - name: Determine if pre-release
        id: prerelease
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '(alpha|beta|rc|dev|canary|preview)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=$(echo '${{ github.ref_name }}' | grep -oE '(alpha|beta|rc|dev|canary|preview)')" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            ac-v${{ github.ref_name }}-darwin-arm64.tar.gz
            ac-v${{ github.ref_name }}-darwin-x64.tar.gz

      # Publish to npm with the arm64 binary bundled
      # (most macOS users are on Apple Silicon)
      - name: Swap to arm64 binary for npm
        run: rm bin/ac-core

      - name: Download arm64 binary again
        uses: actions/download-artifact@v4
        with:
          name: ac-core-darwin-arm64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ac-core

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.prerelease.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true
