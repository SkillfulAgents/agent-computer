name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests-macos:
    name: Unit & Contract Tests (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build ac-core (needed by bridge tests)
        run: cd native/macos && swift build
      - run: npm test

  unit-tests-windows:
    name: Unit & Contract Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: npm ci
      - name: Build ac-core
        run: cd native/windows && dotnet build ACCore/ACCore.csproj
      - run: npm test

  swift-build:
    name: Swift Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: native/macos/.build
          key: swift-${{ runner.os }}-${{ hashFiles('native/macos/Sources/**/*.swift', 'native/macos/Package.swift') }}
          restore-keys: swift-${{ runner.os }}-

      - name: Build ac-core
        run: cd native/macos && swift build

      - name: Swift unit tests (skip integration — requires GUI + accessibility)
        run: cd native/macos && swift test --filter ACCoreTests

  swift-release-build:
    name: Swift Release Build
    runs-on: macos-14
    needs: swift-build
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: native/macos/.build
          key: swift-release-${{ runner.os }}-${{ hashFiles('native/macos/Sources/**/*.swift', 'native/macos/Package.swift') }}
          restore-keys: swift-release-${{ runner.os }}-

      - name: Build release binary
        run: cd native/macos && swift build -c release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-macos-arm64
          path: native/macos/.build/release/ac-core

  dotnet-build:
    name: .NET Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('native/windows/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build ac-core
        run: cd native/windows && dotnet build ACCore/ACCore.csproj

      - name: .NET unit tests
        run: cd native/windows && dotnet test ACCore.Tests/ACCore.Tests.csproj

  dotnet-release-build:
    name: .NET Release Build
    runs-on: windows-latest
    needs: dotnet-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build release binary (self-contained x64)
        run: cd native/windows && dotnet publish ACCore/ACCore.csproj -c Release -r win-x64 --self-contained -o publish-x64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ac-core-windows-x64
          path: native/windows/publish-x64/ac-core.exe

  test-app-build:
    name: Build TestApp
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build ACTestApp
        run: cd native/macos/TestApp && swift build

  # Integration, functional, and E2E tests require:
  #   - A desktop with GUI session
  #   - Accessibility permissions (macOS) or UIAutomation access (Windows)
  #   - Screen Recording permission (macOS, for screenshots)
  #
  # These cannot run on GitHub Actions runners.
  # Run locally with:
  #   npm run test:integration
  #   npm run test:functional
  #   npm run test:e2e
  #   npm run test:all
